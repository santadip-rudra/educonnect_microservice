server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # 1. Auth Service (no AuthFilter needed)
        - id: auth_service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**, /session/**

        # 2. User Management Service
        - id: user_management_service
          uri: lb://user-management-service
          predicates:
            - Path=/student/**, /teacher/**, /parent/**, /user/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 3. Course Service
        - id: course_service
          uri: lb://course-service
          predicates:
            - Path=/course/**, /enroll/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 4. Assessment Service (attachment view — no auth)
        - id: assessment_attachment
          uri: lb://assessment-service
          predicates:
            - Path=/attachment/view/**

        # 5. Assessment Service (general)
        - id: assessment_service
          uri: lb://assessment-service
          predicates:
            - Path=/assessment/**, /attachment/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 6. Student Registry Service
        - id: student_registry_service
          uri: lb://student-registry-service
          predicates:
            - Path=/demographics/**, /v2/api/docs/**, /attendance/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 7. Audit Log Service
        - id: audit_log_service
          uri: lb://audit-log-service
          predicates:
            - Path=/v2/api/audit/**
          filters:
            - name: RateLimiter
              args:
                routeId: audit_log_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 8. Report Service
        - id: report_service
          uri: lb://report-service
          predicates:
            - Path=/report/**
          filters:
            - name: RateLimiter
              args:
                routeId: report_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 9. Compliance Service
        - id: compliance_service
          uri: lb://compliance-service
          predicates:
            - Path=/v2/api/compliance-records/**
          filters:
            - name: RateLimiter
              args:
                routeId: compliance_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true
        # 9. Parent Access - Email Verification (public, no auth required)
        - id: parent_access_verify_public
          uri: lb://parent-access-service
          predicates:
            - Path=/parent-access/verify

        # 10. Parent Access Service (protected)
        - id: parent_access_service
          uri: lb://parent-access-service
          predicates:
            - Path=/parent-access/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true



# --- Discovery & Logging ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
    org.springframework.web.cors: DEBUG