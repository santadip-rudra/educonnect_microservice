server:
  port: 8081

spring:
  application:
    name: api-gateway

  # --- Database Configuration ---
  # Note: Keeping this here only if Gateway performs Auth DB checks.
  # Otherwise, move to the specific Auth-Service.
  datasource:
    url: jdbc:mysql://localhost:3306/auth?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # --- Gateway Logic ---
  cloud:
    gateway:
      # FIX: Global CORS must be a direct child of 'gateway', not inside 'routes'
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # 1. User Management Service
        - id: user_management_service
          uri: lb://user-management-service
          predicates:
            - Path=/student/**, /teacher/**, /parent/**, /user/**
          filters:
            - name: RateLimiter
              args:
                routeId: user_management_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 2. Student Registry Service
        - id: student_registry_service
          uri: lb://student-registry-service
          predicates:
            - Path=/demographics/**, /v2/api/docs/**, /v2/api/attendance/**
          filters:
            - name: RateLimiter
              args:
                routeId: student_registry_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 3. Auth Service (No AuthFilter needed here usually)
        - id: auth_service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**, /session/**
          filters:
            - name: RateLimiter
              args:
                routeId: auth_service

        # 4. Course Service
        - id: course_service
          uri: lb://course-service
          predicates:
            - Path=/course/**, /enroll/**
          filters:
            - name: RateLimiter
              args:
                routeId: course_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 5. Assessment Service (Attachments view)
        - id: assessment_attachment
          uri: lb://assessment-service
          predicates:
            - Path=/attachment/view/**
          filters:
            - name: RateLimiter
              args:
                routeId: assessment_attachment

        # 6. Audit Log Service
        - id: audit_log_service
          uri: lb://audit-log-service
          predicates:
            - Path=/v2/api/audit/**
          filters:
            - name: RateLimiter
              args:
                routeId: audit_log_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        # 7. Assessment Service (General)
        - id: assessment_service
          uri: lb://assessment-service
          predicates:
            - Path=/assessment/**, /attachment/**
          filters:
            - name: RateLimiter
              args:
                routeId: assessment_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true
        # 8. Compliance Service (General)
        - id: compliance_service
          uri: lb://compliance-service
          predicates:
            - Path=/v2/api/compliance-records/**
          filters:
            - name: RateLimiter
              args:
                routeId: compliance_service
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true


# --- Discovery & Logging ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web.cors: DEBUG