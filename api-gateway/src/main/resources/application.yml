server:
  port: 8081

spring:
  application:
    name: api-gateway

  # --- Database (Usually only in Auth-Service, move if possible) ---
  datasource:
    url: jdbc:mysql://localhost:3306/auth?createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # --- Gateway Routing ---
  cloud:
    gateway:
      routes:
        - id: user_management_service
          uri: lb://user-management-service
          predicates:
            - Path=/student/**, /teacher/**, /parent/**, /user/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        - id: student_registry_service
          uri: lb://student-registry-service
          predicates:
            - Path=/demographics/** , /v2/api/docs/**, /v2/api/attendance/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        - id: auth_service
          uri: lb://auth-service
          predicates:
            - Path=/auth/** , /session/**


        - id: course_service
          uri: lb://course-service
          predicates:
              - Path=/course/**, /enroll/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true

        - id: assessment_attachment
          uri: lb://assessment-service
          predicates:
            - Path=/attachment/view/**



        - id: audit_log_service
          uri: lb://audit-log-service
          predicates:
              - Path=/v2/api/audit/**

        - id: assessment_service
          uri: lb://assessment-service
          predicates:
              - Path=/assessment/**, /attachment/**
          filters:
            - name: AuthenticationFilter
              args:
                authUrl: http://auth-service/auth/validate
                forwardHeaders: true





# --- Discovery & Logging ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security.web.server.MatcherSecurityWebFilterChain: TRACE