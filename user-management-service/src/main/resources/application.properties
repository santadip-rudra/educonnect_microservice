spring.application.name=user-management-service
spring.jackson.deserialization.fail-on-unknown-properties=true


spring.datasource.url=jdbc:mysql://localhost:3306/user_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
